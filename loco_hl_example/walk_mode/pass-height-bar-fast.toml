# Prone limbo gait for 0.40m height bar
# 三阶段：降低机身高度（趴低） -> 低位行走（趴着走） -> 恢复机身高度

[[step]]
# 阶段1：降低机身高度（趴低）
mode = 21
gait_id = 5
contact = 15
life_count = 0
vel_des = [ 0.0, 0.0, 0.0,]
rpy_des = [ 0.0, 0.0, 0.0,]
pos_des = [ 0.0, 0.0, 0.14,]
